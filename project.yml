name: Oops
options:
  bundleIdPrefix: com.simao
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Oops:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: iOS
    info:
      path: iOS/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "Oops uses Bluetooth to connect to your smart ring and read its data."
        NSLocalNetworkUsageDescription: "Oops syncs your ring data to your Mac on the same Wi-Fi."
        NSBonjourServices:
          - _oops._tcp
        UILaunchScreen: {}
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simao.oops
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: G7998J9BB3
    preBuildScripts:
      - name: SwiftLint (design tokens)
        basedOnDependencyAnalysis: false
        script: |
          export PATH="$PATH:/opt/homebrew/bin"
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "$SRCROOT/.swiftlint.yml"
          else
            echo "warning: swiftlint not installed (brew install swiftlint)"
          fi
  OopsMac:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: macOS
    info:
      path: macOS/Info.plist
      properties:
        LSUIElement: true
        NSLocalNetworkUsageDescription: "Oops receives your ring data from your iPhone on the same Wi-Fi."
        NSBonjourServices:
          - _oops._tcp
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simao.oops.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts:
      - name: SwiftLint (design tokens)
        basedOnDependencyAnalysis: false
        script: |
          export PATH="$PATH:/opt/homebrew/bin"
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "$SRCROOT/.swiftlint.yml"
          else
            echo "warning: swiftlint not installed (brew install swiftlint)"
          fi
  OopsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OopsTests
    dependencies:
      - target: Oops
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simao.oops.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Oops.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Oops"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  Oops:
    build:
      targets:
        Oops: all
        OopsTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OopsTests
  OopsMac:
    build:
      targets:
        OopsMac: all
    run:
      config: Debug
