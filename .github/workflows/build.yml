name: Build & Publish

on:
  push:
    branches: [main]
    paths:
      - 'Oops/**'
      - 'OopsTests/**'
      - 'project.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Compute version
        id: ver
        run: echo "version=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Generate project
        run: xcodegen generate

      - name: Build unsigned .ipa
        run: |
          set -euo pipefail
          xcodebuild -project Oops.xcodeproj -scheme Oops \
            -configuration Release -sdk iphoneos \
            -derivedDataPath build_ipa \
            MARKETING_VERSION=${{ steps.ver.outputs.version }} \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build
          APP="build_ipa/Build/Products/Release-iphoneos/Oops.app"
          rm -rf Payload Oops.ipa
          mkdir Payload && cp -R "$APP" Payload/
          zip -qr Oops.ipa Payload
          echo "IPA_SIZE=$(stat -f%z Oops.ipa)" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.ver.outputs.version }}"
          gh release create "$TAG" Oops.ipa \
            --repo "${{ github.repository }}" \
            --title "Oops ${{ steps.ver.outputs.version }}" \
            --notes "Automated build from ${{ github.sha }}" \
          || gh release upload "$TAG" Oops.ipa --repo "${{ github.repository }}" --clobber

      - name: Update source.json
        run: |
          python3 .github/scripts/update_source.py \
            "${{ steps.ver.outputs.version }}" \
            "$IPA_SIZE" \
            "https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.version }}/Oops.ipa"

      - name: Commit source.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source.json
          git diff --cached --quiet && { echo "no source.json change"; exit 0; }
          git commit -m "Publish ${{ steps.ver.outputs.version }} [skip ci]"
          git push
